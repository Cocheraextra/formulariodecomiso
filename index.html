<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Formulario de Decomiso - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.1); position: relative; }
        .input-group { background: #f8fafc; border: 2px solid #e2e8f0; padding: 1rem; border-radius: 16px; width: 100%; font-weight: 600; outline: none; transition: all 0.2s; -webkit-appearance: none; font-size: 16px; }
        .input-group:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-main { background: #2563eb; color: white; padding: 1.2rem; border-radius: 18px; font-weight: 800; width: 100%; text-transform: uppercase; transition: all 0.2s; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-main:active { transform: scale(0.98); background: #1d4ed8; }
        .signature-canvas { border: 2px dashed #cbd5e1; border-radius: 20px; background: #fcfcfc; width: 100%; height: 220px; touch-action: none; }
        .mat-tag { background: #1e293b; color: white; padding: 8px 14px; border-radius: 12px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 8px; animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .loader { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .list-card { background: white; border: 2px solid #f1f5f9; padding: 1.2rem; border-radius: 20px; transition: all 0.2s; cursor: pointer; border-left: 6px solid #2563eb; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- VISTA LOGIN -->
        <div id="view-login" class="flex-1 flex flex-col p-8 justify-center">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black italic tracking-tighter text-slate-900 uppercase leading-none">SISTEMA DE<br><span class="text-blue-600">DECOMISO</span></h1>
            </div>
            <div class="space-y-4 bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                <select id="login-role" class="input-group">
                    <option value="1">1. DESPACHO</option>
                    <option value="2">2. GERENCIA</option>
                    <option value="3">3. PREVENCIÓN</option>
                    <option value="admin">ADMINISTRADOR</option>
                </select>
                <input type="password" id="login-pin" pattern="[0-9]*" inputmode="numeric" placeholder="PIN" class="input-group text-center tracking-widest">
                <button onclick="handleLogin()" class="btn-main mt-4">Ingresar</button>
            </div>
        </div>

        <!-- VISTA LISTADO PENDIENTES -->
        <div id="view-list" class="hidden flex-1 flex flex-col">
            <header class="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-20">
                <div>
                    <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Pendientes</span>
                    <h2 class="text-xl font-black text-slate-900 italic uppercase">Bandeja</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="handleExit()" class="p-2 bg-red-50 rounded-xl text-red-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>
            <div id="pending-container" class="p-6 space-y-4 overflow-y-auto"></div>
            <div id="no-pending" class="hidden flex-1 flex flex-col items-center justify-center p-10 text-center opacity-40">
                <p class="font-bold text-xs uppercase tracking-widest">Sin pases pendientes</p>
            </div>
        </div>

        <!-- VISTA PRINCIPAL (Formulario) -->
        <div id="view-main" class="hidden flex-1 flex flex-col">
            <header class="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-20">
                <div class="flex items-center gap-3">
                    <button id="btn-back-list" class="hidden p-2 bg-blue-50 rounded-xl text-blue-600 border border-blue-100" onclick="backToList()">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div>
                        <span id="display-role" class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Sector</span>
                        <h2 id="display-folio" class="text-xl font-black text-slate-900 italic">FOLIO ---</h2>
                    </div>
                </div>
                <button onclick="handleExit()" class="p-2 bg-red-50 rounded-xl text-red-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </header>

            <main class="p-6 space-y-6">
                <!-- Paso 1 (Despacho) -->
                <div id="form-step-1" class="hidden space-y-4">
                    <div class="bg-slate-900 p-6 rounded-[2rem] shadow-xl">
                        <label class="text-[10px] font-bold text-blue-400 uppercase mb-2 block">Materiales</label>
                        <div class="flex gap-2">
                            <input type="text" id="in-mat" placeholder="Agregar elemento..." enterkeyhint="done" class="flex-1 bg-white/10 border-none rounded-xl p-3 text-white outline-none placeholder:text-slate-500">
                            <button id="btn-add-mat" type="button" class="bg-blue-600 px-4 rounded-xl text-white font-bold">+</button>
                        </div>
                        <div id="mat-list" class="mt-4 flex flex-wrap gap-2"></div>
                    </div>
                    <input type="text" id="in-sol" class="input-group uppercase" placeholder="NOMBRE EMISOR" enterkeyhint="next">
                    <input type="text" id="in-des" class="input-group uppercase" placeholder="DESTINO FINAL" enterkeyhint="next">
                    <textarea id="in-causa" class="input-group h-24" placeholder="OBSERVACIONES"></textarea>
                </div>

                <!-- Resumen -->
                <div id="data-summary" class="hidden p-6 bg-blue-50 rounded-[2rem] border border-blue-100 space-y-4">
                    <div class="flex justify-between">
                        <div><p class="text-[9px] font-bold text-blue-400 uppercase">Emisor</p><p id="sum-sol" class="font-black text-slate-800 uppercase text-sm"></p></div>
                        <div class="text-right"><p class="text-[9px] font-bold text-blue-400 uppercase">Destino</p><p id="sum-des" class="font-black text-slate-800 uppercase text-sm"></p></div>
                    </div>
                    <div id="sum-mats" class="flex flex-wrap gap-1"></div>
                    <div id="sum-causa-box" class="pt-2 border-t border-blue-100">
                        <p id="sum-causa" class="text-[11px] text-slate-600 font-medium"></p>
                    </div>
                </div>

                <!-- Firma -->
                <div id="sign-box" class="hidden space-y-4">
                    <div class="flex justify-between items-end px-2">
                        <p class="text-[11px] font-black text-slate-900 uppercase">Firma de Conformidad</p>
                        <button id="btn-clear" class="text-red-500 text-[10px] font-black uppercase">Limpiar</button>
                    </div>
                    <canvas id="pad-canvas" class="signature-canvas"></canvas>
                    <button id="btn-submit" onclick="submitStep()" class="btn-main">
                        <span id="btn-text">Confirmar Firma</span>
                        <div id="btn-loader" class="loader hidden"></div>
                    </button>
                </div>

                <!-- Espera -->
                <div id="wait-msg" class="hidden text-center py-10">
                    <div class="loader mx-auto !border-slate-200 !border-t-blue-600 mb-4"></div>
                    <p id="wait-detail" class="text-[10px] text-slate-400 font-black uppercase tracking-widest"></p>
                </div>
            </main>
        </div>

        <!-- VISTA ADMIN -->
        <div id="view-admin" class="hidden flex-1 flex flex-col p-6">
            <h2 class="text-xl font-black italic mb-4">HISTORIAL</h2>
            <div id="admin-list" class="space-y-4"></div>
        </div>

        <!-- VISTA FINAL -->
        <div id="view-final" class="hidden flex-1 flex flex-col p-10 items-center justify-center text-center">
            <div class="w-20 h-20 bg-emerald-500 text-white rounded-[2rem] flex items-center justify-center mb-6 shadow-xl">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-900">PROCESO<br>COMPLETO</h2>
            <button onclick="downloadPDF()" class="btn-main bg-slate-900 mt-10">Descargar PDF</button>
            <button onclick="window.location.reload()" class="mt-4 text-[10px] font-bold text-blue-600 uppercase">Nueva Consulta</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2vX3I4ZzDJXmcTXBtKuabxDx1wKlTjf8",
            authDomain: "pasessalida.firebaseapp.com",
            projectId: "pasessalida",
            storageBucket: "pasessalida.firebasestorage.app",
            messagingSenderId: "750292585000",
            appId: "1:750292585000:web:e809bcc68523ef81cf431d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        // URL base de la aplicación (Actualízala si cambia el repo)
        const APP_URL = window.location.href.split('?');
        
        let userRole = null;
        let sigPad = null;
        let currentFolio = null;
        let state = { folio: "", step: 1, sol: "", des: "", causa: "", mats: [], signs: {} };
        let unsubscribeList = null;

        onAuthStateChanged(auth, (user) => { if (!user) signInAnonymously(auth); });

        window.handleLogin = async () => {
            const role = document.getElementById('login-role').value;
            const pin = document.getElementById('login-pin').value;
            const validPins = { "1": "0000", "2": "1111", "3": "2222", "admin": "1234" };
            if(pin !== validPins[role]) return alert("PIN incorrecto");
            userRole = role;
            document.getElementById('view-login').classList.add('hidden');
            if(userRole === 'admin') { showAdmin(); return; }
            if(userRole === "1") startNewForm(); else showPendingList();
        };

        async function startNewForm() {
            const newFolio = "F" + Math.floor(100000 + Math.random() * 899999);
            state = { folio: newFolio, step: 1, sol: "", des: "", causa: "", mats: [], signs: {}, timestamp: Date.now() };
            await setDoc(doc(db, 'pases', newFolio), state);
            currentFolio = newFolio;
            document.getElementById('view-main').classList.remove('hidden');
            document.getElementById('display-role').innerText = "Sector: DESPACHO";
            onSnapshot(doc(db, 'pases', currentFolio), (snap) => { if(snap.exists()){ state = snap.data(); updateUI(); } });
        }

        function showPendingList() {
            document.getElementById('view-list').classList.remove('hidden');
            document.getElementById('view-main').classList.add('hidden');
            if(unsubscribeList) unsubscribeList();
            unsubscribeList = onSnapshot(collection(db, 'pases'), (snap) => {
                const container = document.getElementById('pending-container');
                container.innerHTML = "";
                let count = 0;
                snap.forEach(d => {
                    const p = d.data();
                    if(parseInt(p.step) === parseInt(userRole)) {
                        count++;
                        const card = document.createElement('div');
                        card.className = "list-card";
                        card.onclick = () => openPase(p.folio);
                        card.innerHTML = `<div class="flex justify-between items-center"><div><p class="text-[10px] font-black text-blue-600">${p.folio}</p><p class="text-sm font-bold uppercase">${p.sol || '---'}</p></div><svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg></div>`;
                        container.appendChild(card);
                    }
                });
                document.getElementById('no-pending').classList.toggle('hidden', count > 0);
            });
        }

        async function openPase(folio) {
            currentFolio = folio;
            const snap = await getDoc(doc(db, 'pases', folio));
            if(snap.exists()) {
                state = snap.data();
                document.getElementById('view-list').classList.add('hidden');
                document.getElementById('view-main').classList.remove('hidden');
                document.getElementById('btn-back-list').classList.remove('hidden');
                const roleText = userRole === "2" ? "GERENCIA" : "PREVENCIÓN";
                document.getElementById('display-role').innerText = "Sector: " + roleText;
                updateUI();
            }
        }

        window.backToList = () => { showPendingList(); };

        function updateUI() {
            if(!state.folio) return;
            document.getElementById('display-folio').innerText = "FOLIO " + state.folio;
            const isStep1 = state.step === 1;
            document.getElementById('form-step-1').classList.toggle('hidden', !isStep1);
            document.getElementById('data-summary').classList.toggle('hidden', isStep1);

            if(!isStep1) {
                document.getElementById('sum-sol').innerText = state.sol;
                document.getElementById('sum-des').innerText = state.des;
                document.getElementById('sum-causa').innerText = state.causa;
                document.getElementById('sum-mats').innerHTML = state.mats.map(m => `<span class="bg-blue-600 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">${m}</span>`).join('');
            }

            const isMyTurn = (parseInt(state.step) === parseInt(userRole));
            document.getElementById('sign-box').classList.toggle('hidden', !isMyTurn);
            const isWaiting = (userRole === "1" && state.step > 1 && state.step <= 3);
            document.getElementById('wait-msg').classList.toggle('hidden', !isWaiting);
            if(isWaiting) {
                const stepsMap = { "2": "GERENCIA", "3": "PREVENCIÓN" };
                document.getElementById('wait-detail').innerText = "ESPERANDO FIRMA DE " + (stepsMap[state.step] || "PROCESO");
            }
            if(state.step > 3 && userRole === "3") {
                document.getElementById('view-main').classList.add('hidden');
                document.getElementById('view-final').classList.remove('hidden');
            }
            setTimeout(resizeCanvas, 150);
        }

        window.submitStep = async () => {
            if(sigPad.isEmpty()) return alert("Firma requerida");
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');

            if(state.step == 1) {
                const sol = document.getElementById('in-sol').value.trim();
                const des = document.getElementById('in-des').value.trim();
                if(!sol || !des || state.mats.length === 0) {
                    alert("Complete todos los campos y materiales");
                    btn.disabled = false; document.getElementById('btn-text').classList.remove('hidden'); document.getElementById('btn-loader').classList.add('hidden');
                    return;
                }
                state.sol = sol.toUpperCase();
                state.des = des.toUpperCase();
                state.causa = document.getElementById('in-causa').value.trim();
            }

            state.signs['step' + state.step] = sigPad.toDataURL();
            const lastStepDone = state.step;
            state.step++;

            try {
                await setDoc(doc(db, 'pases', state.folio), state);
                sigPad.clear();
                if(lastStepDone < 3) {
                    const nextMap = { "1": "GERENCIA", "2": "PREVENCIÓN" };
                    // Link de WhatsApp mejorado
                    const msg = encodeURIComponent(`📦 *DECOMISO ${state.folio}*\nPendiente firma de: ${nextMap[lastStepDone]}\n\nAcceder aquí:\n${APP_URL}`);
                    window.open(`https://wa.me/?text=${msg}`, '_blank');
                    if(userRole === "1") updateUI(); else showPendingList();
                } else {
                    updateUI(); 
                }
            } catch(e) { alert("Error al guardar"); }
            finally {
                btn.disabled = false; document.getElementById('btn-text').classList.remove('hidden'); document.getElementById('btn-loader').classList.add('hidden');
            }
        };

        // Función para agregar materiales corregida para móviles
        const addMaterialFunc = () => {
            const input = document.getElementById('in-mat');
            const val = input.value.trim().toUpperCase();
            if(val) {
                state.mats.push(val);
                input.value = "";
                renderMats();
                // Devolver el foco al input para seguir agregando si es necesario
                input.focus();
            }
        };

        window.addMaterial = addMaterialFunc;
        document.getElementById('btn-add-mat').addEventListener('click', addMaterialFunc);

        // Corregir Enter en celular
        document.getElementById('in-mat').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault(); // Evitar que el teclado se oculte o haga submit
                addMaterialFunc();
            }
        });

        function renderMats() {
            document.getElementById('mat-list').innerHTML = state.mats.map((m, i) => `<div class="mat-tag">${m} <button onclick="removeMat(${i})" class="ml-1">×</button></div>`).join('');
        }
        window.removeMat = (i) => { state.mats.splice(i, 1); renderMats(); };

        window.downloadPDF = () => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.setFillColor(30, 41, 59);
            pdf.rect(0, 0, 210, 40, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(20);
            pdf.text("ORDEN DE DECOMISO", 20, 25);
            pdf.setTextColor(40, 40, 40);
            pdf.setFontSize(10);
            pdf.text(`FOLIO: ${state.folio}`, 20, 50);
            pdf.text(`EMISOR: ${state.sol}`, 20, 60);
            pdf.text(`DESTINO: ${state.des}`, 20, 68);
            pdf.text(`MATERIALES: ${state.mats.join(", ")}`, 20, 76);
            pdf.text(`OBSERVACIONES: ${state.causa}`, 20, 84);
            const labels = ["DESPACHO", "GERENCIA", "PREVENCION"];
            labels.forEach((l, i) => {
                const x = 20 + (i * 60);
                pdf.text(l, x, 140);
                if(state.signs['step'+(i+1)]) pdf.addImage(state.signs['step'+(i+1)], 'PNG', x, 145, 40, 20);
            });
            pdf.save(`Decomiso_${state.folio}.pdf`);
        };

        window.handleExit = () => { window.location.reload(); };

        function resizeCanvas() {
            const canvas = document.getElementById('pad-canvas');
            if(!canvas || canvas.offsetParent === null) return;
            const ratio = 2; // Fixed high density
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        window.onload = () => {
            sigPad = new SignaturePad(document.getElementById('pad-canvas'), { penColor: "#0f172a" });
            document.getElementById('btn-clear').onclick = () => sigPad.clear();
            window.addEventListener('resize', resizeCanvas);
        };

        async function showAdmin() {
            document.getElementById('view-admin').classList.remove('hidden');
            onSnapshot(collection(db, 'pases'), (snap) => {
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = "p-4 bg-slate-50 rounded-xl border flex justify-between items-center";
                    div.innerHTML = `<div><p class="font-bold">${p.folio}</p><p class="text-[10px] uppercase">${p.sol}</p></div><button onclick="adminDL('${p.folio}')" class="bg-slate-900 text-white p-2 rounded-lg">PDF</button>`;
                    list.appendChild(div);
                });
            });
        }
        window.adminDL = async (f) => { const s = await getDoc(doc(db, 'pases', f)); if(s.exists()){ state = s.data(); downloadPDF(); } };
    </script>
</body>
</html>
